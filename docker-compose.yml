services:
  # Docker API Proxy
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: agenthub-docker-proxy
    restart: always
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 0
      VOLUMES: 0
      EXEC: 0
      POST: 1
      DELETE: 1
      BUILD: 0
      COMMIT: 0
      SERVICES: 0
      TASKS: 0
      SWARM: 0
      PLUGINS: 0
      NODES: 0
      SYSTEM: 0
      AUTH: 0
      DISTRIBUTION: 0
    expose:
      - "2375"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # Backend + Frontend (combined)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agenthub-backend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:8000"
    depends_on:
      docker-proxy:
        condition: service_started
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/agenthub.db
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - ENCRYPTION_KEY_FILE=/run/secrets/encryption_key
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - API_SERVER_KEY_FILE=/run/secrets/api_server_key
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HERMES_DATA_ROOT=/app/data/hermes
      - HOST_DATA_ROOT=${PWD}/data/hermes
      - PORT_RANGE_START=${PORT_RANGE_START:-9001}
      - PORT_RANGE_END=${PORT_RANGE_END:-9100}
      - DOCKER_HOST=http://docker-proxy:2375
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - ENABLE_HTTPS=${ENABLE_HTTPS:-false}

    volumes:
      - ./data:/app/data
      - ./images:/app/images:ro

    secrets:
      - jwt_secret
      - encryption_key
      - api_server_key

    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "service=agenthub-backend"

secrets:
  jwt_secret:
    environment: JWT_SECRET
  encryption_key:
    environment: ENCRYPTION_KEY
  api_server_key:
    environment: API_SERVER_KEY

networks:
  default:
    name: agenthub-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
